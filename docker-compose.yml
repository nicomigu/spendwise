services:
  postgres:
    image: postgres:16-alpine
    container_name: spendwise_db
    environment:
      - POSTGRES_USER=spendwise
      - POSTGRES_PASSWORD=spendwise
      - POSTGRES_DB=spendwise
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/docker
  redis:
    image: redis:8
    container_name: spendwise_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
volumes:
  postgres_data:
  redis_data:
